<!DOCTYPE html>
<html lang="en" class="-debug">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <title>pLTlib test plot</title>
  <meta name="author" content="Eltaurus">

  <script defer src="pLTlib.js"></script>
  <link rel="stylesheet" href="pLTlib.css">

  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>

<style>
  .Plot {
    background: white;
    border-radius: 1em;
    border: solid white 2em;
    border-top-width: 4.5em;
  }
  #controlPanel {
    margin-top: 1em;
  }

  .PlotMarker {
    --Color: #f68302;
  }

  #cosPlot {
    stroke: #777;
  }

  .Plot > .Label {
    font-size: 1.25em;
    top: -2.5em;
  }

</style>
</head>
<body>

<div class="Plot" PlotRange="[-10.5, 10.5]" ScaleRatio=2.9>
  <svg class="Layer"></svg>
  <div class="Layer" Axes Arrowheads AxesLabels="['$$x$$','$$y$$']" Ticks=1 TicksX=5 Subticks=5 MergeOrigin></div>
  <div class="Layer" id="markerLayer"></div>
  <div class="Label">$$k x + b = cos(\omega x)$$</div>
</div>

<div id="controlPanel">
  <input pltvar="t" autoplay loop=true type=range min=-1.2 max=1.2 step=any value=0>
  <input pltvar="k" autoplay loop=true type=range min=1 max=10 step=any value=5>
  <input pltvar="ω" autoplay loop=true type=range min=0.2 max=4 step=any value=1.5>
</div>


<script>

document.addEventListener("DOMContentLoaded", () => {
  const plotL = document.querySelector(".Layer");
  const markersL = document.getElementById("markerLayer");

  const cosL = plotL.add("path", "PlotLine");
  cosL.id = "cosPlot";

  const lineL = plotL.add("line", "PlotLine");
  lineL.setAttribute("x1", -10);
  lineL.setAttribute("x2", 10);
  plt.dynamic.push(({t, k}) => {
    lineL.setAttribute("y1", -10/k + t);
    lineL.setAttribute("y2",  10/k + t);
  });

  plt.dynamic.push(({k, t, ω}) => {
    cosL.setAttribute("d", plt.BezierPlot(t=>Math.cos(ω*t),t=>-ω*Math.sin(ω*t), plt.Subdivide([-10, 10], 50)));


    const sol = plt.NSolve(x=>(x/k + t - Math.cos(ω*x)), plt.Subdivide([-10, 10], 1000));

    markerLayer.innerHTML = "";
    plt.ListPlot(markerLayer, sol.map(x=>[x, x/k + t]), "outlined");

  });

  plt.update(); /* init */

});
</script>

</body>
</html>

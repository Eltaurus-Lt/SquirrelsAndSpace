<!DOCTYPE html>
<html>
<head>

    <script defer src="pLTlib.js"></script>
    <link rel="stylesheet" href="pLTlib.css">

    <style>


.Plot {
  border: 2px solid black;
}

.Axis {
  align-items: center;
--Thickness: 1px;
--TickLength: 5px;
}

#PlotRow {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  border: white 5px solid;
}

body {
  max-width: 900px;
  margin: 0 auto;
}

.PlotLine {
 stroke-dasharray: .5 .5;
 stroke-dashoffset: 1;
 animation: trace 5s linear infinite;

vector-effect: none;
stroke-width: 0.15;

  --Color: color-mix(Orange 30%, brown);
}

@keyframes trace {
  to {
    stroke-dashoffset: 0;
  }
}
    </style>
  </head>
  <body>




<div id="PlotRow">
<div class="Plot" PlotRange=14.9 AspectRatio=1>
 <svg class="Layer" id="canvasLeft"></svg>
 <div class="Layer" Axes Ticks=5 Subticks=5></div>
</div> 
<div class="Plot" PlotRange=14.9 AspectRatio=1>
 <svg class="Layer" id="canvasRight"></svg>
 <div class="Layer" Axes Ticks=5 Subticks=5></div>
</div> 
</div>

<input pltvar="ρ" type="range" min="0" max="28" step="any" value="15"> 
<input pltvar="σ" type="range" min="0" max="10" step="any" value="2"> 
<input pltvar="β" type="range" min="0" max="2.66667" step="any" value="0.2"> 
<input pltvar="φ" type="range" min="0" max="6.28318530" step="any" value="1"> 




    <script>
document.addEventListener("DOMContentLoaded", () => {

leftPlot = document.getElementById("canvasLeft");
rightPlot = document.getElementById("canvasRight");
attLeft = leftPlot.add("path", "PlotLine");
attRight = rightPlot.add("path", "PlotLine");

plt.dynamic.push(({ρ, σ, β, φ}) => {

  lorenzRHS = function f(t, [x, y, z]) {
    return [
             σ * (y - x),
             x * (ρ - z) - y,
             x * y - β * z
           ];
  };
  sol = plt.NDSolve(lorenzRHS, [1, 1, 10], plt.Subdivide([0, 50], 1000));

  solXY = sol.map(([t,[x,y,z]])=>[x*Math.cos(φ)+y*Math.sin(φ),-x*Math.sin(φ)+y*Math.cos(φ)]); 
  attLeft.setAttribute("d", plt.BezierListPlot(solXY));
  attLeft.setAttribute("pathLength", 1);


  solSide = sol.map(([t,[x,y,z]])=>[x*Math.cos(φ)+y*Math.sin(φ),z-12]); 
  attRight.setAttribute("d", plt.BezierListPlot(solSide));
  attRight.setAttribute("pathLength", 1);

  
}); 








plt.update();
});


   </script>
  </body>
</html>
